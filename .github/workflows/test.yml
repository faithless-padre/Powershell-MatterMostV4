name: Integration Tests

on:
  workflow_dispatch:
  workflow_call:

jobs:
  lint:
    name: PSScriptAnalyzer
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run linter
        run: |
          pwsh -Command "
            Install-Module PSScriptAnalyzer -Force -Scope CurrentUser
            \$results = Invoke-ScriptAnalyzer -Path ./MatterMostV4 -Recurse -Severity Error
            if (\$results) { \$results; exit 1 }
          "

  manifest:
    name: Test-ModuleManifest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate manifest
        run: |
          pwsh -Command "
            \$result = Test-ModuleManifest ./MatterMostV4/MatterMostV4.psd1
            if (-not \$result) { exit 1 }
          "

  test:
    name: "Mattermost ${{ matrix.mm_version }}"
    needs: [lint, manifest]
    runs-on: ubuntu-latest
    permissions:
      checks: write
      contents: read

    strategy:
      matrix:
        mm_version: ['9.11.14', '10.11.4', '11.5.1']

    steps:
      - uses: actions/checkout@v4

      - name: Run integration tests
        working-directory: Sandbox
        run: MM_VERSION=${{ matrix.mm_version }} docker compose run --rm tests

      - name: Publish test results
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: "Pester · MM ${{ matrix.mm_version }}"
          path: Pester/results.xml
          reporter: java-junit

      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: Pester/coverage.xml
          name: "MM ${{ matrix.mm_version }}"
          fail_ci_if_error: false
