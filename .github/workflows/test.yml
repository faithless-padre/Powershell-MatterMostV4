name: Integration Tests

on:
  workflow_dispatch:

jobs:
  lint:
    name: PSScriptAnalyzer
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run linter
        run: |
          pwsh -Command "
            Install-Module PSScriptAnalyzer -Force -Scope CurrentUser
            \$results = Invoke-ScriptAnalyzer -Path ./MatterMostV4 -Recurse -Severity Error
            if (\$results) { \$results; exit 1 }
          "

  test:
    name: "Mattermost ${{ matrix.mm_version }}"
    needs: lint
    runs-on: ubuntu-latest
    permissions:
      checks: write
      contents: read

    strategy:
      matrix:
        mm_version: ['11.5.1']

    steps:
      - uses: actions/checkout@v4

      - name: Run integration tests
        working-directory: Sandbox
        run: MM_VERSION=${{ matrix.mm_version }} docker compose run --rm tests

      - name: Publish test results
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: "Pester · MM ${{ matrix.mm_version }}"
          path: Pester/results.xml
          reporter: java-junit
