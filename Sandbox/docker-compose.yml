services:
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: mattermost
      POSTGRES_USER: mmuser
      POSTGRES_PASSWORD: mmpassword
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mmuser -d mattermost"]
      interval: 5s
      timeout: 5s
      retries: 10

  mattermost:
    image: mattermost/mattermost-team-edition:${MM_VERSION:-11.5.1}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8065:8065"
    environment:
      MM_SQLSETTINGS_DRIVERNAME: postgres
      MM_SQLSETTINGS_DATASOURCE: postgres://mmuser:mmpassword@postgres/mattermost?sslmode=disable
      MM_SERVICESETTINGS_SITEURL: http://localhost:8065
      MM_EMAILSETTINGS_SENDEMAILNOTIFICATIONS: "false"
      MM_EMAILSETTINGS_SMTPSERVER: ""
      MM_TEAMSETTINGS_ENABLEOPENSERVER: "true"

  setup:
    image: curlimages/curl:latest
    depends_on:
      - mattermost
    volumes:
      - ./setup.sh:/setup.sh:ro
    entrypoint: ["sh", "/setup.sh"]
    restart: "no"

  tests:
    profiles: ["tests"]
    build:
      context: ..
      dockerfile: Pester/Dockerfile
    depends_on:
      setup:
        condition: service_completed_successfully
    volumes:
      - ../MatterMostV4:/module:ro
      - ../Pester:/tests:ro
    environment:
      MM_URL: http://mattermost:8065
      MM_ADMIN_USERNAME: admin
      MM_ADMIN_PASSWORD: Admin123456!
      MM_TEST_USERNAME: testuser
      MM_TEST_PASSWORD: Test123456!
    command: pwsh /tests/run-tests.ps1
